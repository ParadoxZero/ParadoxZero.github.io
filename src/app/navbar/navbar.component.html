<div id="nav">
  <div id="nav-options" *ngIf="isNavBarOpen.getValue()">
    <ul>
      <li *ngFor="let item of dataService.menuList.getValue()">
        <div>
          <a href="{{item.Action}}">{{item.Name}}</a>
        </div>
      </li>
    </ul>
  </div>
  <div id="nav-button-container">
    <button type="button" class="btn btn-lg btn-outline-dark nav-button" (click)="toggleNavbar()">
      <fa-icon [icon]="currentIcon"></fa-icon>
    </button>
  </div>
</div>
